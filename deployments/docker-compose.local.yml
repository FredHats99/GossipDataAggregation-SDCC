services:
  node1:
    image: ${APP_IMAGE}
    pull_policy: never
    build:
      context: ..
      dockerfile: ${DOCKERFILE_PATH}
    container_name: ${CLUSTER_NAME}-${NODE1_ID}
    restart: unless-stopped
    environment:
      NODE_ID: ${NODE1_ID}
      HTTP_ADDR: 0.0.0.0:8080
      BIND_ADDR: 0.0.0.0:${GOSSIP_PORT}
      API_ADDR: 0.0.0.0:8080
      SEED_NODES: ${SEED_NODES}
      GOSSIP_INTERVAL_MS: ${GOSSIP_INTERVAL_MS}
      ANTI_ENTROPY_INTERVAL_MS: ${ANTI_ENTROPY_INTERVAL_MS}
      FANOUT: ${FANOUT}
      TOPK_MAX: ${TOPK_MAX}
      OUTBOUND_QUEUE_SIZE: ${OUTBOUND_QUEUE_SIZE}
      DELTA_HISTORY_SIZE: ${DELTA_HISTORY_SIZE:-1024}
      DATA_DIR: ${DATA_DIR:-/var/lib/gossip}
      SNAPSHOT_INTERVAL_SECONDS: ${SNAPSHOT_INTERVAL_SECONDS:-30}
      WAL_FSYNC_MODE: ${WAL_FSYNC_MODE:-always}
      WAL_FSYNC_BATCH_SIZE: ${WAL_FSYNC_BATCH_SIZE:-32}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${API_PORT_BASE}:8080"
      - "${GOSSIP_PORT}:${GOSSIP_PORT}/udp"
    networks:
      - gossip-net
    volumes:
      - node1-data:/var/lib/gossip

  node2:
    image: ${APP_IMAGE}
    pull_policy: never
    container_name: ${CLUSTER_NAME}-${NODE2_ID}
    depends_on:
      - node1
    restart: unless-stopped
    environment:
      NODE_ID: ${NODE2_ID}
      HTTP_ADDR: 0.0.0.0:8080
      BIND_ADDR: 0.0.0.0:${GOSSIP_PORT}
      API_ADDR: 0.0.0.0:8080
      SEED_NODES: ${SEED_NODES}
      GOSSIP_INTERVAL_MS: ${GOSSIP_INTERVAL_MS}
      ANTI_ENTROPY_INTERVAL_MS: ${ANTI_ENTROPY_INTERVAL_MS}
      FANOUT: ${FANOUT}
      TOPK_MAX: ${TOPK_MAX}
      OUTBOUND_QUEUE_SIZE: ${OUTBOUND_QUEUE_SIZE}
      DELTA_HISTORY_SIZE: ${DELTA_HISTORY_SIZE:-1024}
      DATA_DIR: ${DATA_DIR:-/var/lib/gossip}
      SNAPSHOT_INTERVAL_SECONDS: ${SNAPSHOT_INTERVAL_SECONDS:-30}
      WAL_FSYNC_MODE: ${WAL_FSYNC_MODE:-always}
      WAL_FSYNC_BATCH_SIZE: ${WAL_FSYNC_BATCH_SIZE:-32}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "18081:8080"
      - "7001:${GOSSIP_PORT}/udp"
    networks:
      - gossip-net
    volumes:
      - node2-data:/var/lib/gossip

  node3:
    image: ${APP_IMAGE}
    pull_policy: never
    container_name: ${CLUSTER_NAME}-${NODE3_ID}
    depends_on:
      - node1
    restart: unless-stopped
    environment:
      NODE_ID: ${NODE3_ID}
      HTTP_ADDR: 0.0.0.0:8080
      BIND_ADDR: 0.0.0.0:${GOSSIP_PORT}
      API_ADDR: 0.0.0.0:8080
      SEED_NODES: ${SEED_NODES}
      GOSSIP_INTERVAL_MS: ${GOSSIP_INTERVAL_MS}
      ANTI_ENTROPY_INTERVAL_MS: ${ANTI_ENTROPY_INTERVAL_MS}
      FANOUT: ${FANOUT}
      TOPK_MAX: ${TOPK_MAX}
      OUTBOUND_QUEUE_SIZE: ${OUTBOUND_QUEUE_SIZE}
      DELTA_HISTORY_SIZE: ${DELTA_HISTORY_SIZE:-1024}
      DATA_DIR: ${DATA_DIR:-/var/lib/gossip}
      SNAPSHOT_INTERVAL_SECONDS: ${SNAPSHOT_INTERVAL_SECONDS:-30}
      WAL_FSYNC_MODE: ${WAL_FSYNC_MODE:-always}
      WAL_FSYNC_BATCH_SIZE: ${WAL_FSYNC_BATCH_SIZE:-32}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "18082:8080"
      - "7002:${GOSSIP_PORT}/udp"
    networks:
      - gossip-net
    volumes:
      - node3-data:/var/lib/gossip

networks:
  gossip-net:
    name: ${CLUSTER_NAME}-net

volumes:
  node1-data:
    name: ${CLUSTER_NAME}-node1-data
  node2-data:
    name: ${CLUSTER_NAME}-node2-data
  node3-data:
    name: ${CLUSTER_NAME}-node3-data
